# Load env: docker compose --env-file config/.env up --build
services:
        postgres:
                image: postgres:16-alpine
                restart: always
                volumes:
                        - ${PWD}/data:/var/lib/postgresql/data
                environment:
                        POSTGRES_DB: ${FEATMAP_DB}
                        POSTGRES_USER: ${FEATMAP_DB_USER}
                        POSTGRES_PASSWORD: ${FEATMAP_DB_PASSWORD}
                healthcheck:
                        test: ["CMD-SHELL", "pg_isready -U ${FEATMAP_DB_USER}"]
                        interval: 10s
                        timeout: 5s
                        retries: 5
        featmap:
                restart: always
                build:
                        context: .
                        dockerfile: Dockerfile
                ports:
                        - "${FEATMAP_HTTP_PORT}:5000"
                depends_on:
                    postgres:
                        condition: service_healthy
                volumes:
                        - ${PWD}/config/conf.json:/opt/featmap/conf.json
                healthcheck:
                        test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:5000/"]
                        interval: 10s
                        timeout: 5s
                        retries: 5
                        start_period: 30s

        featmap-mcp:
                build:
                        context: ./featmap-mcp
                        dockerfile: Dockerfile
                restart: always
                ports:
                        - "3000:3000"
                environment:
                        FEATMAP_BASE_URL: http://featmap:5000
                        FEATMAP_API_KEY: ${FEATMAP_MCP_API_KEY}
                        MCP_PORT: 3000
                depends_on:
                        featmap:
                                condition: service_healthy

        featmap-mcp:
                build:
                        context: ./featmap-mcp
                        dockerfile: Dockerfile
                restart: always
                ports:
                        - "3000:3000"
                environment:
                        FEATMAP_BASE_URL: http://featmap:5000
                        FEATMAP_API_KEY: ${FEATMAP_MCP_API_KEY}
                        MCP_PORT: 3000
                depends_on:
                        - featmap

